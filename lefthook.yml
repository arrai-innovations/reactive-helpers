commit-msg:
    commands:
        commitlint:
            run: pnpm exec commitlint --edit "$1"

pre-commit:
    parallel: false
    commands:
        eslint:
            run: |
                if [ -z "${CI:-}" ]; then
                  exit 0
                fi
                pnpm exec eslint --cache index.js config tests use utils
        prettier:
            run: |
                if [ -z "${CI:-}" ]; then
                  exit 0
                fi
                pnpm exec prettier --check .
        fix-eslint:
            stage_fixed: true
            glob: "**/*.{js,cjs,mjs,ts,jsx,tsx}"
            exclude:
                - "**/node_modules/**"
                - "**/coverage/**"
                - "types/**"
                - "**/*.d.ts"
            run: pnpm exec eslint --cache --fix {staged_files}
        fix-prettier:
            stage_fixed: true
            glob: "**/*.{less,scss,css,vue,js,mjs,cjs,ts,tsx,jsx,markdown,json,md,yml,yaml,html}"
            exclude:
                - "**/node_modules/**"
                - "**/coverage/**"
                - "pnpm-lock.yaml"
                - "**/AGENTS.md"
            run: pnpm exec prettier --write {staged_files}
        fix-md-toc:
            stage_fixed: true
            glob: "**/*.md"
            exclude:
                - "**/AGENTS.md"
            run: pnpm exec doctoc --github -u --loglevel error {staged_files}
        circleci-config:
            glob: ".circleci/*.yml"
            run: |
                command -v circleci > /dev/null 2>&1 || exit 0
                for file in {staged_files}; do
                  circleci config validate "$file"
                done
