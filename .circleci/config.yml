version: 2.1
orbs:
    eslint: arrai/eslint@8.1.0
    prettier: arrai/prettier@5.10.0
    npm: arrai/npm@3.1.0
    github: arrai/github@5.0.0
executors:
    lts:
        environment:
            LANG: en_US.UTF-8
        docker:
            - image: cimg/node:lts
jobs:
    check-generated:
        executor: lts
        working_directory: ~/project
        steps:
            - checkout
            - run:
                  name: Install dependencies
                  command: npm ci
            - run:
                  name: Generate types and docs
                  command: npm run docs
            - run:
                  name: Check generated types/docs are in sync
                  command: npm run docs:check
            - run:
                  name: Type declarations smoke test
                  command: npm run types:check
workflows:
    test:
        jobs:
            - npm/coverage:
                  name: tests
                  context: arrai-global
                  filters:
                      branches:
                          only:
                              - main
            - check-generated:
                  name: main-docs-and-types
                  requires:
                      - tests
                  filters:
                      branches:
                          only: main
            - npm/coverage:
                  name: tests-no-badge
                  context: arrai-global
                  create_badges: false
                  filters:
                      tags:
                          only: /.*/
                      branches:
                          ignore:
                              - main
            - check-generated:
                  name: non-main-docs-and-types
                  requires:
                      - tests-no-badge
                  filters:
                      tags:
                          only: /.*/
                      branches:
                          ignore:
                              - main
            - npm/publish:
                  name: publish
                  context: arrai-private-package-publishing
                  requires:
                      - non-main-docs-and-types
                  filters:
                      tags:
                          only: /.*/
                      branches:
                          ignore: /.*/
            - github/create_release:
                  name: release_on_github
                  context: arrai-global
                  requires:
                      - non-main-docs-and-types
                  filters:
                      tags:
                          only: /.*/
                      branches:
                          ignore: /.*/
    lint:
        jobs:
            - eslint/eslint_fixed_ip:
                  name: eslint
                  context: arrai-global
                  files: "."
                  wd: "."
                  config:
                      - run:
                            name: NPM
                            command: npm ci
                  filters:
                      branches:
                          only:
                              - main
            - eslint/eslint:
                  name: eslint-no-badge
                  files: "."
                  wd: "."
                  config:
                      - run:
                            name: NPM
                            command: npm ci
                  create_badges: false
                  filters:
                      branches:
                          ignore:
                              - main
            - prettier/code_style_fixed_ip:
                  name: prettier
                  context: arrai-global
                  filters:
                      branches:
                          only:
                              - main
            - prettier/code_style:
                  name: prettier-no-badge
                  create_badges: false
                  filters:
                      branches:
                          ignore:
                              - main
    audit:
        jobs:
            - npm/audit_fixed_ip:
                  name: audit
                  context:
                      - arrai-global
                  skip_dev: false
                  filters:
                      branches:
                          only:
                              - main
            - npm/audit:
                  name: audit-no-badge
                  context:
                      - arrai-global
                  skip_dev: false
                  create_badges: false
                  filters:
                      branches:
                          ignore:
                              - main
