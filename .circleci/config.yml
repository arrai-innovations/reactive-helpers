version: 2.1
orbs:
    eslint: arrai/eslint@7.0.0
    prettier: arrai/prettier@5.0.0
    utils: arrai/utils@1.8.0
    npm: arrai/npm@2.2.0
executors:
    node:
        environment:
            LANG: C.UTF-8
        docker:
            - image: cimg/node:16.14-browsers
jobs:
    publish:
        parameters:
            executor:
                description: "Execution environment for the publish job."
                type: executor
                default: node
            resource_class:
                type: enum
                enum: [small, medium, medium+, large, xlarge, 2xlarge, 2xlarge+]
                default: small
        executor: <<parameters.executor>>
        resource_class: <<parameters.resource_class>>
        steps:
            - checkout
workflows:
    test:
        jobs:
            - npm/coverage:
                  name: tests
                  context: arrai-global
                  filters:
                      branches:
                          only:
                              - main
            - npm/coverage:
                  name: tests-no-badge
                  context: arrai-global
                  create_badges: false
                  filters:
                      branches:
                          ignore:
                              - main
            - publish:
                  name: npm_publish
                  context: arrai-private-package-publishing
    lint:
        jobs:
            - eslint/eslint:
                  name: eslint
                  context: arrai-global
                  files: "."
                  wd: "."
                  config:
                      - run:
                            name: NPM
                            command: |
                                sudo npm install -g --upgrade npm
                                npm ci
                  filters:
                      branches:
                          only:
                              - main
            - eslint/eslint:
                  name: eslint-no-badge
                  context: arrai-global
                  files: "."
                  wd: "."
                  config:
                      - run:
                            name: NPM
                            command: |
                                sudo npm install -g --upgrade npm
                                npm ci
                  create_badges: false
                  filters:
                      branches:
                          ignore:
                              - main
            - prettier/code_style:
                  name: prettier
                  context: arrai-global
                  executor: node
                  version: 2.6.2
                  filters:
                      branches:
                          only:
                              - main
            - prettier/code_style:
                  name: prettier-no-badge
                  context: arrai-global
                  executor: node
                  version: 2.6.2
                  create_badges: false
                  filters:
                      branches:
                          ignore:
                              - main
