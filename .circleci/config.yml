version: 2.1
orbs:
    eslint: arrai/eslint@7.0.0
    prettier: arrai/prettier@5.0.0
    utils: arrai/utils@1.8.0
executors:
    node:
        environment:
            LANG: C.UTF-8
        docker:
            - image: cimg/node:16.14-browsers
jobs:
    tests:
        parameters:
            executor:
                description: "Execution environment for the test job."
                type: executor
                default: node
            resource_class:
                type: enum
                enum: [small, medium, medium+, large, xlarge, 2xlarge, 2xlarge+]
                default: medium
        executor: <<parameters.executor>>
        resource_class: <<parameters.resource_class>>
        steps:
            - checkout
            - utils/add_ssh_config
            - run:
                  name: Install additional OS packages
                  command: |
                      sudo apt update
                      sudo apt install rsync
            - run:
                  name: Install Packages
                  command: |
                      echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
                      sudo npm install -g --upgrade npm
                      npm ci
            - run:
                  name: Run Tests
                  command: |
                      npm run coverage
            - utils/rsync_folder:
                  when: always
                  folder: ./coverage/
                  remote_folder: ${CIRCLE_BRANCH}/coverage_${CIRCLE_JOB}
                  host: docs
            - when:
                  condition:
                      equal: [main, <<pipeline.git.branch>>]
                  steps:
                      - utils/make_status_shield:
                            when: on_fail
                            status: errors
                            color: red
                            logo: Node.js
                      - utils/make_status_shield:
                            when: on_success
                            status: passed
                            color: brightgreen
                            logo: Node.js
                      - utils/rsync_file:
                            when: always
                            file: ~/status.svg
                            remote_file: ${CIRCLE_BRANCH}/${CIRCLE_JOB}.svg
                            host: docs
                      - run:
                            name: Create coverage report
                            when: always
                            command: |
                                jq '((.total.branches.pct + .total.statements.pct) / 2) | floor' coverage/coverage-summary.json >> /tmp/.coveragep
                      - utils/make_coverage_shield:
                            when: always
                            link: https://${DOCS_HOST}/${CIRCLE_PROJECT_REPONAME}/artifacts/${CIRCLE_BRANCH}/coverage_${CIRCLE_JOB}/
                      - utils/rsync_file:
                            when: always
                            file: ~/coverage.svg
                            remote_file: ${CIRCLE_BRANCH}/${CIRCLE_JOB}.coverage.svg
                            host: docs
workflows:
    test:
        jobs:
            - tests:
                  name: node_tests
                  context: arrai-global
    lint:
        jobs:
            - eslint/eslint:
                  name: eslint
                  context: arrai-global
                  files: "."
                  wd: "."
                  config:
                      - run:
                            name: NPM
                            command: |
                                echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
                                sudo npm install -g --upgrade npm
                                npm ci
                  filters:
                      branches:
                          only:
                              - main
            - eslint/eslint:
                  name: eslint-no-badge
                  context: arrai-global
                  files: "."
                  wd: "."
                  config:
                      - run:
                            name: NPM
                            command: |
                                echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
                                sudo npm install -g --upgrade npm
                                npm ci
                  create_badges: false
                  filters:
                      branches:
                          ignore:
                              - main
            - prettier/code_style:
                  name: prettier
                  context: arrai-global
                  executor: node
                  version: 2.6.2
                  filters:
                      branches:
                          only:
                              - main
            - prettier/code_style:
                  name: prettier-no-badge
                  context: arrai-global
                  executor: node
                  version: 2.6.2
                  create_badges: false
                  filters:
                      branches:
                          ignore:
                              - main
