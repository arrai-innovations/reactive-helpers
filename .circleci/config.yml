version: 2.1
orbs:
    eslint: arrai/eslint@7.8.0
    prettier: arrai/prettier@5.7.0
    npm: arrai/npm@2.11.0
    github: arrai/github@1.1.0
workflows:
    test:
        jobs:
            #            - npm/coverage:
            #                  name: tests
            #                  context: arrai-global
            #                  filters:
            #                      branches:
            #                          only:
            #                              - main
            #            - npm/coverage:
            #                  name: tests-no-badge
            #                  context: arrai-global
            #                  create_badges: false
            #                  filters:
            #                      tags:
            #                          only: /.*/
            #                      branches:
            #                          ignore:
            #                              - main
            - npm/publish:
                  name: publish
                  context: arrai-private-package-publishing
                  #                  requires:
                  #                      - tests-no-badge
                  filters:
                      tags:
                          only: /.*/
                      branches:
                          ignore: /.*/
            - github/create_release:
                  name: release_on_github
                  context: arrai-global
                  #                  requires:
                  #                      - tests-no-badge
                  filters:
                      tags:
                          only: /.*/
                      branches:
                          ignore: /.*/
    lint:
        jobs:
            - eslint/eslint_fixed_ip:
                  name: eslint
                  context: arrai-global
                  files: "."
                  wd: "."
                  config:
                      - run:
                            name: NPM
                            command: npm ci
                  filters:
                      branches:
                          only:
                              - main
            - eslint/eslint:
                  name: eslint-no-badge
                  files: "."
                  wd: "."
                  config:
                      - run:
                            name: NPM
                            command: npm ci
                  create_badges: false
                  filters:
                      branches:
                          ignore:
                              - main
            - prettier/code_style_fixed_ip:
                  name: prettier
                  context: arrai-global
                  filters:
                      branches:
                          only:
                              - main
            - prettier/code_style:
                  name: prettier-no-badge
                  create_badges: false
                  filters:
                      branches:
                          ignore:
                              - main
