version: 2.1

orbs:
    github: arrai/github@5.0.0
    lintinator: arrai/lintinator@2.1.6
    pnpm: arrai/pnpm@2.0.0
    utils: arrai/utils@1.22.0

jobs:
    check-generated:
        executor: pnpm/lts
        working_directory: ~/project
        steps:
            - checkout
            - pnpm/install_pnpm
            - restore_cache:
                  keys:
                      - pnpm-v1-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}
            - run:
                  name: Install dependencies
                  command: pnpm install --frozen-lockfile
            - save_cache:
                  paths:
                      - ~/.local/share/pnpm/store
                  key: pnpm-v1-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}
            - run:
                  name: Generate types and docs
                  command: pnpm run docs
            - run:
                  name: Check generated types/docs are in sync
                  command: pnpm run docs:check
            - run:
                  name: Type declarations smoke test
                  command: pnpm run types:check -- --skip-gen

    coverage:
        parameters:
            create_badges:
                type: boolean
                default: true
        executor: pnpm/lts
        resource_class: medium
        circleci_ip_ranges: true
        steps:
            - checkout
            - utils/add_ssh_config
            - pnpm/install_pnpm
            - restore_cache:
                  keys:
                      - pnpm-v1-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}
            - run:
                  name: Install dependencies
                  command: pnpm install --frozen-lockfile
            - save_cache:
                  paths:
                      - ~/.local/share/pnpm/store
                  key: pnpm-v1-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}
            - run:
                  name: Run tests with coverage
                  command: pnpm coverage
            - utils/rsync_folder:
                  when: always
                  folder: ~/project/coverage/
                  remote_folder: ${CIRCLE_BRANCH}/coverage_${CIRCLE_JOB}
                  host: docs
            - when:
                  condition: <<parameters.create_badges>>
                  steps:
                      - utils/make_status_shield:
                            when: on_fail
                            status: errors
                            color: red
                            logo: Node.js
                      - utils/make_status_shield:
                            when: on_success
                            status: passed
                            color: brightgreen
                            logo: Node.js
                      - utils/rsync_file:
                            when: always
                            file: ~/status.svg
                            remote_file: ${CIRCLE_BRANCH}/${CIRCLE_JOB}.svg
                            host: docs
                      - run:
                            name: Create coverage report
                            when: always
                            command: |
                                jq 'if (.total.branches.pct | type) == "number" and (.total.statements.pct | type) == "number" then ((.total.branches.pct + .total.statements.pct) / 2) else 0 end | floor' coverage/coverage-summary.json > /tmp/.coveragep
                      - utils/make_coverage_shield:
                            when: always
                            link: https://${DOCS_HOST}/${CIRCLE_PROJECT_REPONAME}/artifacts/${CIRCLE_BRANCH}/coverage_${CIRCLE_JOB}/
                      - utils/rsync_file:
                            when: always
                            file: /tmp/coverage.svg
                            remote_file: ${CIRCLE_BRANCH}/${CIRCLE_JOB}.coverage.svg
                            host: docs

    docs-site:
        executor: pnpm/lts
        resource_class: medium
        working_directory: ~/project
        circleci_ip_ranges: true
        steps:
            - checkout
            - pnpm/install_pnpm
            - restore_cache:
                  keys:
                      - pnpm-v1-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}
            - run:
                  name: Install dependencies
                  command: pnpm install --frozen-lockfile
            - run:
                  name: Build docs site (per major)
                  command: |
                      # Base must equal the full served subpath or assets 404.
                      MAJOR="${CIRCLE_TAG#v}"; MAJOR="${MAJOR%%.*}"
                      VITEPRESS_BASE="/reactive-helpers/documentation/v${MAJOR}/" pnpm run docs:site:build
            - run:
                  name: Stage docs for deploy
                  command: |
                      # The tools.arrai.dev SSH user is chrooted to
                      # reactive-helpers/documentation/, so publish/ maps there and
                      # v<major>/ resolves to .../documentation/v<major>/.
                      MAJOR="${CIRCLE_TAG#v}"; MAJOR="${MAJOR%%.*}"
                      mkdir -p -m 0750 "publish/v${MAJOR}/"
                      cp -r site/* "publish/v${MAJOR}/"
            - utils/add_ssh_config:
                  hostname: tools.arrai.dev
                  host: tools.arrai.dev
            # tools.arrai.dev deploy key for reactive-helpers. Same principal as the
            # `docs` host used for artifacts, but this key's chroot points at the
            # documentation root (docs.arrai.dev/reactive-helpers/documentation/),
            # the same setup badass and vueda use for their docs sites.
            - add_ssh_keys:
                  fingerprints:
                      - "SHA256:3Ho4jJepPm55XSG0R3/WIsMNnjfoXLxCIpUUzobirVU"
            - utils/rsync_folder:
                  when: on_success
                  folder: ~/project/publish/
                  remote_folder: /
                  delete: false
                  host: tools.arrai.dev

workflows:
    test:
        jobs:
            - coverage:
                  name: tests
                  context: arrai-global
                  filters:
                      branches:
                          only:
                              - main
            - check-generated:
                  name: main-docs-and-types
                  requires:
                      - tests
                  filters:
                      branches:
                          only: main
            - coverage:
                  name: tests-no-badge
                  context: arrai-global
                  create_badges: false
                  filters:
                      tags:
                          only: /.*/
                      branches:
                          ignore:
                              - main
            - check-generated:
                  name: non-main-docs-and-types
                  requires:
                      - tests-no-badge
                  filters:
                      tags:
                          only: /.*/
                      branches:
                          ignore:
                              - main
            - pnpm/publish:
                  name: publish
                  context: arrai-global
                  oidc: true
                  requires:
                      - non-main-docs-and-types
                  filters:
                      tags:
                          only: /.*/
                      branches:
                          ignore: /.*/
            - github/create_release:
                  name: release_on_github
                  context: arrai-global
                  requires:
                      - publish
                  filters:
                      tags:
                          only: /.*/
                      branches:
                          ignore: /.*/
            - docs-site:
                  name: docs-site
                  context: arrai-global
                  requires:
                      - publish
                  filters:
                      tags:
                          only: /.*/
                      branches:
                          ignore: /.*/

    lint:
        jobs:
            - lintinator/lint_python_fixed_ip:
                  name: lint
                  context: arrai-global
                  executor: lintinator/node-lts
                  hooks: prettier eslint
                  hook_manager: lefthook
                  install_deps: false
                  setup:
                      - pnpm/install_pnpm
                      - run:
                            name: Install dependencies
                            command: pnpm install --frozen-lockfile
                  filters:
                      branches:
                          only:
                              - main
            - lintinator/lint_python:
                  name: lint-no-badge
                  context: arrai-global
                  executor: lintinator/node-lts
                  hooks: prettier eslint
                  hook_manager: lefthook
                  install_deps: false
                  create_badges: false
                  setup:
                      - pnpm/install_pnpm
                      - run:
                            name: Install dependencies
                            command: pnpm install --frozen-lockfile
                  filters:
                      branches:
                          ignore:
                              - main

    audit:
        jobs:
            - pnpm/audit_fixed_ip:
                  name: audit
                  context: arrai-global
                  executor: pnpm/lts
                  skip_dev: false
                  npm_registry: registry.npmjs.org
                  npm_token: $NPM_TOKEN
                  filters:
                      branches:
                          only:
                              - main
            - pnpm/audit:
                  name: audit-no-badge
                  context: arrai-global
                  executor: pnpm/lts
                  skip_dev: false
                  create_badges: false
                  npm_registry: registry.npmjs.org
                  npm_token: $NPM_TOKEN
                  filters:
                      branches:
                          ignore:
                              - main
